
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shop - 3rd Eye Supply</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body { font-family: 'Arial', sans-serif; background: #fefefe; color: #333; }
    .product-card {
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      transition: transform 0.3s ease;
      background: white;
    }
    .product-card:hover { transform: translateY(-10px); }
    .product-img { width: 100%; height: 300px; object-fit: cover; }
    .card-body { text-align: center; }
    h2.section-title {
      margin: 2rem auto 1rem;
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container py-5">
    <h2 class="section-title">Shop Sacred Sculptures</h2>
    <div class="row g-4">
      <div class="col-md-6 col-lg-3">
        <div class="product-card">
          <img src="images/buddha.jpg" alt="Buddha" class="product-img"/>
          <div class="card-body">
            <h5>Buddha Orgonite</h5>
            <p>$33.00</p>
            <a href="#" class="btn btn-outline-dark">View</a>
          </div>
        </div>
      </div>
      <div class="col-md-6 col-lg-3">
        <div class="product-card">
          <img src="images/pyramid.jpg" alt="Pyramid" class="product-img"/>
          <div class="card-body">
            <h5>Orgonite Pyramid</h5>
            <p>$29.00</p>
            <a href="#" class="btn btn-outline-dark">View</a>
          </div>
        </div>
      </div>
      <div class="col-md-6 col-lg-3">
        <div class="product-card">
          <img src="images/angel.jpg" alt="Angel" class="product-img"/>
          <div class="card-body">
            <h5>Angel Sculpture</h5>
            <p>$27.00</p>
            <a href="#" class="btn btn-outline-dark">View</a>
          </div>
        </div>
      </div>
      <div class="col-md-6 col-lg-3">
        <div class="product-card">
          <img src="images/starfish.jpg" alt="Starfish" class="product-img"/>
          <div class="card-body">
            <h5>Starfish Orgonite</h5>
            <p>$25.00</p>
            <a href="#" class="btn btn-outline-dark">View</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
