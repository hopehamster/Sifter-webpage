
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sifter – Real People. Real Proximity.</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-overlay"></div>
  <header>
    <div class="headline-container">
      <div class="headline active">You’re surrounded by stories. Sifter lets you hear them.</div>
      <div class="headline">Before there were followers, there were neighbors.</div>
      <div class="headline">This isn’t an app. It’s a portal to the people around you.</div>
    </div>
    <p class="subheadline">
      Real conversations. Local trade. Human connection — right where you are.<br/>
      Sifter brings your block back online.
    </p>
    <form action="https://formspree.io/f/moqgjznb" method="POST" class="email-form">
      <input type="email" name="email" placeholder="Your email" required>
      <button type="submit">Notify Me</button>
    </form>
  </header>

  <script>
    const headlines = document.querySelectorAll('.headline');
    let index = 0;
    setInterval(() => {
      headlines[index].classList.remove('active');
      index = (index + 1) % headlines.length;
      headlines[index].classList.add('active');
    }, 5000);
  </script>
</body>
</html>
