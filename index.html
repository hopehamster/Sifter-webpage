<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sifter – Real People. Real Proximity.</title>

  <!-- Base Styles -->
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0; 
      font-family: "Segoe UI", sans-serif; 
      background: radial-gradient(ellipse at top left, #1a1a2e, #0f0f0f); 
      color: #fff; 
      text-align: center; 
      padding: 2em;
    }
    img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 0 auto;
    }
    h1 {
      font-size: 2rem;
      margin-top: 0.5em;
    }
    p {
      font-size: 1.1rem;
      max-width: 600px;
      margin: 1em auto 2em;
      line-height: 1.6;
    }
    /* Logo */
    .logo {
      width: 100px;
      margin-bottom: 1em;
    }

    /* Email form */
    form {
      margin: 0.5em auto 2em;
    }
    input[type="email"] {
      padding: 0.8em;
      width: 250px;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
    }
    button {
      padding: 0.8em 1.2em;
      margin-left: 0.5em;
      background: #f97316;
      border: none;
      border-radius: 4px;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover {
      opacity: 0.9;
    }

    /* Badges area */
    .badges {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5em;
      margin-top: 2em;
    }
    .badges img {
      height: 60px; 
      display: inline-block;
    }
    @media (min-width: 600px) {
      .badges {
        flex-direction: row;
      }
    }
  </style>
</head>
<body>

  <!-- Logo -->
  <img src="logo.png" alt="Sifter Logo" class="logo"/>

  <!-- Headline / Tagline -->
  <h1>Sifter</h1>
  <p>Real conversations. Local trade. Human connection – right where you are.</p>

  <!-- Email Form (Formspree) -->
  <form action="https://formspree.io/f/moqgjznb" method="POST">
    <input type="email" name="email" placeholder="Enter your email" required />
    <button type="submit">Notify Me</button>
  </form>

  <!-- Badges -->
  <div class="badges">
    <img src="coming-soon-ios.png" alt="Coming Soon on iOS" />
    <img src="coming-soon-android.png" alt="Coming Soon on Android" />
  </div>

</body>
</html>
