
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sifter – Real People. Real Proximity.</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: radial-gradient(ellipse at top left, #1a1a2e, #0f0f0f);
      color: #fff;
      padding: 2em;
      text-align: center;
    }
    .logo {
      width: 80px;
      height: auto;
      margin-bottom: 1rem;
    }
    input[type="email"] {
      padding: 0.6em;
      width: 250px;
      border-radius: 4px;
      border: none;
    }
    button {
      padding: 0.6em 1.2em;
      margin-left: 0.5em;
      background: #f97316;
      color: #fff;
      border: none;
      border-radius: 4px;
    }
    .badges {
      margin-top: 2em;
    }
    .badges img {
      height: 50px;
      margin: 1em;
    }
  </style>
</head>
<body>
  <img src="logo.png" alt="Sifter Logo" class="logo" />
  <h1>Sifter</h1>
  <p>Real conversations. Local trade. Human connection - right where you are.</p>
  <form action="https://formspree.io/f/moqgjznb" method="POST">
    <input type="email" name="email" placeholder="Your email" required>
    <button type="submit">Notify Me</button>
  </form>
  <div class="badges">
    <img src="coming-soon-ios.png" alt="Coming Soon on iOS" />
    <img src="coming-soon-android.png" alt="Coming Soon on Android" />
  </div>
</body>
</html>
